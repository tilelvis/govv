name: AI Entity Extraction

on:
  schedule:
    # Run daily at 5:00 AM EAT = 2:00 AM UTC (after gazette collector)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Node deps for AI helper
        working-directory: ai/src
        run: npm install

      - name: Run AI Extraction
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ai/src/extract_entities.py